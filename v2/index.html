<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareerBoost — Your AI Job-Search Command Center</title>
  <meta name="description" content="Land better roles faster with CareerBoost: a clear AI-assisted workflow for resume tailoring, applications, follow-ups, and interview prep." />
  <meta name="theme-color" content="#05070f" />
  <meta name="robots" content="index, follow" />

  <!-- Canonical URL — tells Google which version of the site is authoritative
       so apex/www/http variants don't split SEO authority. -->
  <link rel="canonical" href="https://www.careerboost.co.za/" />

  <!-- Favicons + PWA manifest. SVG favicon for modern browsers (sharp
       at any size); PNG fallbacks for older clients and Safari/iOS.
       Note: /favicon.ico is also served via vercel.json rewrite ->
       /favicon-48.png, because some search-engine crawlers (Bing
       especially) check /favicon.ico FIRST before reading the
       <link rel="icon"> tags below. The "shortcut icon" rel is a
       legacy alias kept for old crawlers; modern browsers ignore it. -->
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
  <link rel="icon" type="image/png" sizes="128x128" href="/favicon-128.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.json" />

  <!-- Open Graph (Facebook, LinkedIn, Slack, Discord) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="CareerBoost" />
  <meta property="og:url" content="https://www.careerboost.co.za/" />
  <meta property="og:title" content="CareerBoost — Your AI Job-Search Command Center" />
  <meta property="og:description" content="A professional AI-assisted workflow to plan, tailor, apply, and prep with confidence. No spam." />
  <meta property="og:image" content="https://www.careerboost.co.za/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="CareerBoost — Your AI Job-Search Command Center" />

  <!-- Twitter / X card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="CareerBoost — Your AI Job-Search Command Center" />
  <meta name="twitter:description" content="A professional AI-assisted workflow to plan, tailor, apply, and prep with confidence." />
  <meta name="twitter:image" content="https://www.careerboost.co.za/og-image.png" />
  <meta name="twitter:image:alt" content="CareerBoost — Your AI Job-Search Command Center" />

  <!-- JSON-LD structured data so Google can render rich snippets
       (Organization knowledge panel, SoftwareApplication chip). -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Organization",
        "@id": "https://www.careerboost.co.za/#organization",
        "name": "CareerBoost",
        "url": "https://www.careerboost.co.za/",
        "logo": "https://www.careerboost.co.za/favicon-128.png",
        "description": "AI job-search command center for resume tailoring, applications, follow-ups, and interview prep.",
        "sameAs": []
      },
      {
        "@type": "WebSite",
        "@id": "https://www.careerboost.co.za/#website",
        "url": "https://www.careerboost.co.za/",
        "name": "CareerBoost",
        "publisher": { "@id": "https://www.careerboost.co.za/#organization" }
      },
      {
        "@type": "SoftwareApplication",
        "name": "CareerBoost",
        "operatingSystem": "Web",
        "applicationCategory": "BusinessApplication",
        "description": "AI-assisted job-search workflow: research roles, tailor resumes, track applications, and prep for interviews — without auto-apply spam.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    ]
  }
  </script>

  <!-- Week 2 #4 perf: trimmed Google Fonts from 3 families × 9 weights
       down to 2 families × 4 weights. Space Grotesk dropped entirely
       (CSS fallback to Inter via --font-family-display in tokens.css).
       Inter weights reduced 400/500/600/700/800 → 400/600/700 (covers
       normal/semibold/bold — we don't actually render 500 or 800 at
       a size where the difference matters). JetBrains Mono trimmed
       500/600 → 500 only. Net ~120KB savings off first-paint.

       Future: self-host the Font Awesome subset (~230 icons in use,
       see audit in commit log) via Fontello/IcoMoon for another
       ~250KB savings. Logged as admin_incident `perf:fa-subset`. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />

  <!-- CSS bundle: 9 stylesheets concatenated + minified by esbuild.
       Cascade order is maintained in build.mjs (SHEETS array).
       To rebuild after editing a stylesheet: npm run build -->
  <link rel="stylesheet" href="./src/styles/bundle.min.css" />

  <!-- Day 1.3: Plausible analytics — privacy-friendly, no cookies, no
       GDPR banner required. Loaded async so it never blocks the page.
       Gated to ONLY fire on the production hostname so localhost /
       127.0.0.1 / file:// dev sessions don't pollute the metrics. -->
  <script>
    (function () {
      var h = (window.location && window.location.hostname) || "";
      var isProd = /^(www\.)?careerboost\.co\.za$/i.test(h);
      if (!isProd) return;
      // Inject the Plausible loader. Mirrors the snippet from the
      // Plausible dashboard verbatim aside from this prod-only guard.
      var s = document.createElement("script");
      s.async = true;
      s.src = "https://plausible.io/js/pa-fcdWatYRN5FBDP3u6Rw7R.js";
      document.head.appendChild(s);
      window.plausible = window.plausible || function () {
        (plausible.q = plausible.q || []).push(arguments);
      };
      plausible.init = plausible.init || function (i) { plausible.o = i || {}; };
      plausible.init();
    })();
  </script>
</head>
<body>
  <!-- P3: Boot splash. Renders BEFORE any JS / app CSS loads, so even
       a cold visit shows the brand mark + spinner instead of a blank
       white flash. Removed by bootstrap.js once the app shell is
       rendered. Styles are inline (not in main bundle) because the
       bundle may take 300-800ms to arrive on a slow connection or
       after a deploy.
       Hidden once the body gets the .cb-booted class. -->
  <style id="cb-boot-splash-styles">
    /* Hide app shell until the splash fades out — prevents the brief
       "Loading Dashboard V2…" fallback from flashing into view. */
    body:not(.cb-booted) #app { visibility: hidden; }
    #cb-boot-splash {
      position: fixed; inset: 0; z-index: 2147483640;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 18px;
      background: radial-gradient(ellipse at top, #0f172a 0%, #05070f 70%);
      color: #f8fbff;
      font: 14px/1.4 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      transition: opacity 240ms ease;
    }
    body.cb-booted #cb-boot-splash { opacity: 0; pointer-events: none; }
    #cb-boot-splash .cb-boot-mark {
      width: 80px; height: 80px;
      display: block;
      filter: drop-shadow(0 12px 40px rgba(34, 227, 255, 0.35));
    }
    #cb-boot-splash .cb-boot-name {
      font-size: 18px; font-weight: 700; letter-spacing: -0.01em;
      color: #f8fbff;
    }
    #cb-boot-splash .cb-boot-name span {
      color: #38bdf8;
    }
    #cb-boot-splash .cb-boot-spinner {
      width: 24px; height: 24px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.12);
      border-top-color: #5eead4;
      animation: cb-boot-spin 600ms linear infinite;
      margin-top: 4px;
    }
    @keyframes cb-boot-spin { to { transform: rotate(360deg); } }
    #cb-boot-splash .cb-boot-hint {
      font-size: 12px; color: rgba(248, 251, 255, 0.5);
      max-width: 280px; text-align: center; margin-top: 10px;
    }
    /* Slow-network failsafe: if the app isn't booted after 8s, show
       a "Still loading?" line so the user knows it's not stuck. */
    #cb-boot-splash .cb-boot-stuck { display: none; }
    body:not(.cb-booted) #cb-boot-splash.is-slow .cb-boot-stuck { display: block; }
  </style>
  <div id="cb-boot-splash" role="status" aria-label="Loading CareerBoost">
    <!-- Inline copy of v2/src/assets/logo-mark.svg so it renders the
         instant the page parses — no extra network request. If you
         update the SVG asset, update this copy too (it's a 25-line
         inline svg, easy to keep in sync). -->
    <svg class="cb-boot-mark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="CareerBoost">
      <defs>
        <linearGradient id="cbBootMarkBg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#0d1326"/>
          <stop offset="100%" stop-color="#0a0f1d"/>
        </linearGradient>
        <linearGradient id="cbBootMarkFill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="rgba(34, 227, 255, 0.14)"/>
          <stop offset="100%" stop-color="rgba(34, 227, 255, 0.04)"/>
        </linearGradient>
      </defs>
      <rect width="200" height="200" rx="22" ry="22" fill="url(#cbBootMarkBg)" stroke="#1a2240" stroke-width="1"/>
      <g transform="translate(100, 100)">
        <rect x="-62" y="-62" width="124" height="124" rx="7" ry="7" transform="rotate(45)" fill="url(#cbBootMarkFill)" stroke="#22e3ff" stroke-width="4"/>
        <rect x="-46" y="-46" width="92" height="92" rx="4" ry="4" transform="rotate(45)" fill="none" stroke="#22e3ff" stroke-width="1" stroke-opacity="0.5"/>
        <text x="0" y="14" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif" font-weight="700" font-size="44" fill="#f8fbff" letter-spacing="0.04em">CB</text>
      </g>
    </svg>
    <div class="cb-boot-name">Career<span>Boost</span></div>
    <div class="cb-boot-spinner" aria-hidden="true"></div>
    <p class="cb-boot-hint">Loading your workspace…</p>
    <p class="cb-boot-hint cb-boot-stuck">
      Still loading? Check your connection or
      <a href="#" onclick="window.location.reload();return false;" style="color:#5eead4;">refresh the page</a>.
    </p>
  </div>
  <script>
    // After 8s without boot, mark the splash as slow so the help line
    // appears. Removed automatically when bootstrap.js sets .cb-booted.
    setTimeout(function () {
      if (!document.body.classList.contains("cb-booted")) {
        var s = document.getElementById("cb-boot-splash");
        if (s) s.classList.add("is-slow");
      }
    }, 8000);
  </script>

  <div id="app">
    <section class="page-container">
      <h1 class="page-title">Loading Dashboard V2...</h1>
      <p class="page-subtitle">If this stays visible, JavaScript failed to load.</p>
    </section>
  </div>

  <!-- Supabase SDK (loaded before config/auth scripts). No-op when backend is not configured. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>

  <!-- JS bundle: 109 source files concatenated + minified by esbuild.
       Source order is maintained in build.mjs (SCRIPTS array).
       To rebuild after editing a source file: npm run build -->
  <script src="./src/js/bundle.min.js"></script>

  <!-- Service worker registration. Required for Chrome to fire
       beforeinstallprompt (which powers the install nudge) and to make the
       PWA installable, which in turn enables the Web Share Target feature.
       sw.js is a network passthrough — no offline/caching behavior. -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("/sw.js").catch(function (err) {
          // Non-fatal: the app works fine without it, just not installable.
          console.warn("[cb] service worker registration failed:", err);
        });
      });
    }
  </script>
</body>
</html>
