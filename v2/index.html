<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareerBoost — Your AI Job-Search Command Center</title>
  <meta name="description" content="Land better roles faster with CareerBoost: a clear AI-assisted workflow for resume tailoring, applications, follow-ups, and interview prep." />
  <meta name="theme-color" content="#05070f" />
  <meta name="robots" content="index, follow" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="CareerBoost — Your AI Job-Search Command Center" />
  <meta name="twitter:description" content="A professional AI-assisted workflow to plan, tailor, apply, and prep with confidence." />
  <meta property="og:title" content="CareerBoost — Your AI Job-Search Command Center" />
  <meta property="og:description" content="A professional AI-assisted workflow to plan, tailor, apply, and prep with confidence." />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="CareerBoost" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@500;600&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />

  <link rel="stylesheet" href="./src/styles/tokens.css" />
  <link rel="stylesheet" href="./src/styles/base.css" />
  <link rel="stylesheet" href="./src/styles/layout.css" />
  <link rel="stylesheet" href="./src/styles/modules.css" />
  <link rel="stylesheet" href="./src/styles/auth.css" />
  <link rel="stylesheet" href="./src/styles/phase1.css" />
  <link rel="stylesheet" href="./src/styles/design-system.css" />
  <link rel="stylesheet" href="./src/styles/phase5-cleanup.css" />
  <link rel="stylesheet" href="./src/styles/admin.css" />
</head>
<body>
  <div id="app">
    <section class="page-container">
      <h1 class="page-title">Loading Dashboard V2...</h1>
      <p class="page-subtitle">If this stays visible, JavaScript failed to load.</p>
    </section>
  </div>

  <!-- Supabase SDK (loaded before config/auth scripts). No-op when backend is not configured. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>

  <script src="./src/js/app/config.js?v=20260516-aadefer"></script>
  <!-- Phase 8: observability MUST load right after config so it can
       capture any error from the rest of the bootstrap. It installs
       window.onerror + unhandledrejection handlers immediately. -->
  <script src="./src/js/services/observability/observability.js"></script>
  <script src="./src/js/auth/auth.service.js?v=20260515-oauth"></script>
  <!-- Phase E2: acquisition attribution. Captures UTM + referrer on
       every page load (first-touch wins), then POSTs to the signup-
       attribution Edge Function once the user is authenticated. -->
  <script src="./src/js/auth/auth.attribution.js"></script>
  <script src="./src/js/app/usage-tracker.js"></script>
  <script src="./src/js/app/profile.js"></script>

  <script src="./src/js/ai/ai.schemas.js"></script>
  <script src="./src/js/ai/ai.providers.js"></script>
  <script src="./src/js/ai/ai.telemetry.js"></script>
  <script src="./src/js/ai/ai.orchestrator.js"></script>
  <script src="./src/js/app/state.js"></script>
  <script src="./src/js/app/store.js"></script>
  <script src="./src/js/app/store.remote.js"></script>
  <script src="./src/js/app/utils/strings.js"></script>
  <script src="./src/js/app/utils/download.js"></script>
  <script src="./src/js/app/utils/semantic-match.js"></script>
  <script src="./src/js/app/shared/loading.js"></script>
  <script src="./src/js/app/shared/placeholder-view.js"></script>
  <script src="./src/js/app/shared/toast.js"></script>
  <script src="./src/js/app/shortcuts.js"></script>
  <script src="./src/js/components/brand-kit.js"></script>
  <script src="./src/js/components/app-shell.js"></script>
  <script src="./src/js/components/global-search.js"></script>
  <script src="./src/js/components/status-pill.js"></script>
  <script src="./src/js/components/logos.js"></script>
  <script src="./src/js/components/ui-kit.js"></script>
  <script src="./src/js/services/jobs/job.notes.js"></script>
  <!-- Phase 4.5: in-app modal service replacing window.confirm/.prompt/.alert.
       Loads before any module that uses it. Gracefully no-op if not loaded;
       all callsites fall back to native confirm/prompt. -->
  <script src="./src/js/components/modal-service.js"></script>
  <!-- Phase Billing: entitlements + upgrade modal + gate helper. Must
       load AFTER auth.service.js (consumed via window.CBV2.auth) but
       BEFORE the feature modules that gate behavior (resume, cover-
       letter, interview). Order inside this block matters: entitlements
       first, then upgrade-modal (uses entitlements.upgradeNeededFor),
       then entitlement-gate (uses both). -->
  <script src="./src/js/services/entitlements/entitlements.js"></script>
  <script src="./src/js/components/upgrade-modal.js"></script>
  <script src="./src/js/services/entitlements/entitlement-gate.js"></script>
  <script src="./src/js/components/app-drawer.js?v=20260516-aa2c2"></script>
  <!-- V1 in-app AI guidance panel. ai-chat-knowledge defines FEATURES +
       buildSystemPrompt(); ai-chat-panel mounts the FAB + drawer. Both
       are gated by CB_CONFIG.featureFlags.aiChatPanel. Load AFTER
       ai.orchestrator (uses runSkill) + auth.service (uses isAuthenticated). -->
  <script src="./src/js/components/ai-chat-knowledge.js"></script>
  <script src="./src/js/components/ai-chat-panel.js"></script>
  <script src="./src/js/components/command-palette.js"></script>

  <script src="./src/js/services/jobs/job.normalize.js"></script>
  <script src="./src/js/services/jobs/job.providers.custom.js"></script>
  <script src="./src/js/services/jobs/job.intent.js"></script>
  <script src="./src/js/services/jobs/job.search.js"></script>
  <script src="./src/js/services/jobs/job.matcher.js?v=20260516-aiscore30"></script>
  <script src="./src/js/services/jobs/job.workflow.js"></script>
  <script src="./src/js/services/candidate/candidate.intelligence.js"></script>
  <script src="./src/js/services/candidate/role.context.js"></script>
  <script src="./src/js/services/candidate/application.command-center.js"></script>
  <script src="./src/js/services/candidate/product.intelligence.js"></script>

  <script src="./src/js/auth/auth.route.js"></script>
  <!-- Post-confirmation landing. Reached after a user clicks the
       confirmation link in their signup email (or an OAuth round-trip).
       Replaces the bare #/dashboard redirect with a polished "You're in!"
       card and a friendly recovery path if the link expired. -->
  <script src="./src/js/auth/auth.confirmed.js"></script>
  <script src="./src/js/marketing/welcome.route.js"></script>
  <script src="./src/js/modules/onboarding/onboarding.route.js"></script>
  <script src="./src/js/modules/dashboard/dashboard.route.js"></script>
  <script src="./src/js/modules/job-search/job-search.shared.js"></script>
  <script src="./src/js/modules/job-search/job-search.route.js?v=20260516-paginate"></script>
  <script src="./src/js/modules/applications/applications.route.js?v=20260516-aadefer"></script>
  <!-- Phase 7: calendar export + integrations. Order matters: ics + gcal
       must load BEFORE calendar.route.js so the toolbar/card renderers
       can read window.CBV2.calendarIcs / .calendarGcal at render time.
       Notifications loads anywhere; its ticker starts on DOMContentLoaded. -->
  <script src="./src/js/modules/calendar/calendar.ics.js"></script>
  <script src="./src/js/modules/calendar/calendar.gcal.js"></script>
  <script src="./src/js/modules/calendar/calendar.notifications.js"></script>
  <script src="./src/js/modules/calendar/calendar.route.js"></script>
  <script src="./src/js/modules/resume/resume.model.js"></script>
  <script src="./src/js/modules/resume/resume.parser.js"></script>
  <script src="./src/js/modules/resume/resume.templates.js"></script>
  <script src="./src/js/modules/resume/resume.docx.js"></script>
  <script src="./src/js/modules/resume/resume.export.js"></script>
  <script src="./src/js/modules/resume/resume.quality.js"></script>
  <script src="./src/js/modules/resume/resume.route.js"></script>
  <script src="./src/js/modules/cover-letter/cover-letter.route.js"></script>
  <script src="./src/js/services/interview/company-intel.service.js"></script>
  <!-- Phase 4.5: interviewer personas. Loads BEFORE interview.route.js
       so the chip selector + intelStepPayloadBase can read the canonical
       persona list at render time. -->
  <script src="./src/js/modules/interview/interview.personas.js"></script>
  <!-- Phase 4.5 voice: Web Speech API wrapper. Loads BEFORE
       interview.route.js so the mock UI can call CBV2.interviewVoice
       at render time. No backend dependency — 100% client-side. -->
  <script src="./src/js/modules/interview/interview.voice.js"></script>
  <script src="./src/js/modules/interview/interview.route.js"></script>
  <script src="./src/js/modules/analytics/analytics.shared.js"></script>
  <script src="./src/js/modules/analytics/analytics.route.js"></script>
  <!-- Apply Assist (Phase 1): apply-profile schema + gating helpers. Loads
       BEFORE settings.route.js because the Settings → Apply Assist tab calls
       CBV2.applyAssist.getProfile() at render time. -->
  <script src="./src/js/services/apply-assist/apply-profile.js?v=20260516-aadefer"></script>
  <script src="./src/js/modules/settings/settings.meta.js?v=20260516-aadefer"></script>
  <!-- Phase Billing: settings → Billing tab renderer. Loads before
       settings.route.js which calls window.CBV2.settingsBilling.render(). -->
  <script src="./src/js/modules/settings/settings.billing.js"></script>
  <script src="./src/js/modules/settings/settings.route.js?v=20260516-aadefer"></script>
  <!-- Phase D: admin console split into helpers + per-section files. Load order:
       admin-helpers.js exposes window.CBV2.adminHelpers (state caches + shared renderers);
       sections/*.js each register on window.CBV2.adminSections[<id>];
       admin.route.js (loaded last) wires the dispatcher + fetchers + bindings. -->
  <script src="./src/js/modules/admin/admin-helpers.js"></script>
  <!-- Phase 8: realtime subscriptions for admin_incidents + audit_log.
       Must load after admin-helpers (state caches) but before
       admin.route.js (which sets up the afterRender hook). -->
  <script src="./src/js/modules/admin/admin-realtime.js"></script>
  <!-- Phase E1: Command Center replaces the old Overview as the admin home.
       The old sections/overview.js stays in the tree as a fallback for any
       caller that still requests section=overview, but it's no longer the
       primary home — currentSection() redirects "overview" → "command-center". -->
  <script src="./src/js/modules/admin/sections/command-center.js"></script>
  <script src="./src/js/modules/admin/sections/growth.js"></script>
  <!-- Phase E4: Product Intelligence — the ROI board. Reads
       data.productIntelligence from admin-overview. Sits at the top of
       the Analytics nav group; the raw boards (usage/ai-cost/extension)
       moved to a "Deep dives" group. -->
  <script src="./src/js/modules/admin/sections/product-intelligence.js"></script>
  <script src="./src/js/modules/admin/sections/overview.js"></script>
  <script src="./src/js/modules/admin/sections/usage-engagement.js"></script>
  <script src="./src/js/modules/admin/sections/funnel.js"></script>
  <!-- Phase E3: sections/users.js registers BOTH "users" and the legacy
       "user-support" ID, so user-support.js is no longer loaded. -->
  <script src="./src/js/modules/admin/sections/users.js"></script>
  <script src="./src/js/modules/admin/sections/job-feed.js"></script>
  <script src="./src/js/modules/admin/sections/ai-cost.js"></script>
  <script src="./src/js/modules/admin/sections/extension.js"></script>
  <script src="./src/js/modules/admin/sections/sync.js"></script>
  <script src="./src/js/modules/admin/sections/risk-center.js"></script>
  <script src="./src/js/modules/admin/sections/reports.js"></script>
  <script src="./src/js/modules/admin/sections/logs.js"></script>
  <script src="./src/js/modules/admin/sections/settings.js"></script>
  <!-- Phase E5: consolidated boards. Health folds in risk-center + sync +
       job-feed; Operations folds in reports + settings + logs. Legacy
       section URLs still work via their original renderers above. -->
  <script src="./src/js/modules/admin/sections/health.js"></script>
  <script src="./src/js/modules/admin/sections/operations.js"></script>
  <!-- Operational: API key status + rotation commands. Read-only — talks
       to the admin-credentials edge function which never returns values. -->
  <script src="./src/js/modules/admin/sections/credentials.js?v=20260517-health"></script>
  <!-- Roadmap: deferred-feature reminders. Currently just Apply Assist V1
       (built but hidden because V1 only covers Greenhouse — see the section
       itself for re-enable criteria). -->
  <script src="./src/js/modules/admin/sections/apply-assist.js"></script>
  <script src="./src/js/modules/admin/admin.route.js?v=20260516-credentials"></script>
  <script src="./src/js/app/router.js"></script>
  <script src="./src/js/app/bootstrap.js"></script>
</body>
</html>
