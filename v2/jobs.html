<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jobs by role &amp; city — CareerBoost</title>
  <meta name="description" content="Find jobs by role and city across South Africa, with CV and interview help from CareerBoost." />
  <link rel="canonical" href="https://www.careerboost.co.za/jobs" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Jobs by role &amp; city — CareerBoost" />
  <meta property="og:description" content="Find jobs by role and city across South Africa." />
  <meta property="og:image" content="https://www.careerboost.co.za/og-image.png" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#05070f; --card:#0d1326; --border:rgba(255,255,255,0.09); --accent:#7cf0ff; --accent2:#a888ff; --text:#f0f4ff; --muted:rgba(240,244,255,0.6); }
    body { background: var(--bg); color: var(--text); font-family: Inter, system-ui, sans-serif; line-height: 1.65; }
    a { color: var(--accent); }
    .wrap { max-width: 760px; margin: 0 auto; padding: 28px 20px 80px; }
    header.site { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid var(--border); }
    .brand { font-weight: 800; font-size: 18px; text-decoration: none; color: var(--text); }
    .brand span { color: var(--accent); }
    .cta { font-size: 13px; font-weight: 600; padding: 8px 14px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #04121a; text-decoration: none; }
    h1.page { font-size: 30px; font-weight: 800; letter-spacing: -0.02em; margin: 18px 0 6px; }
    .lead { color: var(--muted); margin-bottom: 28px; }
    .page-card { display: block; padding: 16px 18px; margin-bottom: 12px; border: 1px solid var(--border); border-radius: 14px; background: var(--card); text-decoration: none; color: inherit; }
    .page-card:hover { border-color: rgba(124,240,255,0.35); }
    .page-card h2 { font-size: 17px; font-weight: 700; }
    .page-card p { color: var(--muted); font-size: 13px; margin-top: 4px; }
    article.page h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; margin: 10px 0 16px; }
    article.page h2 { font-size: 20px; font-weight: 700; margin: 26px 0 10px; }
    article.page h3 { font-size: 17px; font-weight: 700; margin: 20px 0 8px; }
    article.page p { margin: 0 0 16px; }
    article.page ul { margin: 0 0 16px 22px; }
    article.page li { margin-bottom: 6px; }
    .back { display: inline-block; margin-bottom: 18px; color: var(--muted); text-decoration: none; font-size: 14px; }
    .back:hover { color: var(--accent); }
    .cta-row { margin-top: 28px; display: flex; gap: 12px; flex-wrap: wrap; }
    .cta-row .cta.secondary { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
    .footer-cta { margin-top: 40px; padding: 24px; border: 1px solid var(--border); border-radius: 16px; background: linear-gradient(135deg, rgba(124,240,255,0.07), rgba(168,136,255,0.05)); text-align: center; }
    .footer-cta h3 { font-size: 20px; margin-bottom: 8px; }
    .footer-cta p { color: var(--muted); margin-bottom: 16px; }
    .empty, .loading { color: var(--muted); padding: 40px 0; text-align: center; }
    footer.site { border-top: 1px solid var(--border); padding: 24px 20px; text-align: center; color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>
  <header class="site">
    <a class="brand" href="/">Career<span>Boost</span></a>
    <a class="cta" data-cta data-campaign="seo" href="/?utm_source=seo&amp;utm_medium=header&amp;utm_campaign=jobs#/auth?mode=signup">Get started free</a>
  </header>
  <main class="wrap" id="root"><p class="loading">Loading…</p></main>
  <footer class="site">© <span id="yr"></span> CareerBoost · <a href="/jobs">Jobs</a> · <a href="/blog">Blog</a> · <a href="/">Home</a></footer>

  <script>
  (function () {
    var FN = "https://kddffkhwpbngiupfmcse.functions.supabase.co/content-public";
    var TRACK = "https://kddffkhwpbngiupfmcse.functions.supabase.co/content-track";
    var root = document.getElementById("root");
    document.getElementById("yr").textContent = new Date().getFullYear();

    function esc(s) { return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }
    function inline(s) {
      return esc(s).replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
        .replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" rel="noopener" target="_blank">$1</a>');
    }
    function md(src) {
      var lines = String(src || "").replace(/\r/g, "").split("\n"), out = [], para = [], list = [];
      function fp() { if (para.length) { out.push("<p>" + inline(para.join(" ")) + "</p>"); para = []; } }
      function fl() { if (list.length) { out.push("<ul>" + list.map(function (i) { return "<li>" + inline(i) + "</li>"; }).join("") + "</ul>"); list = []; } }
      lines.forEach(function (ln) {
        var t = ln.trim();
        if (!t) { fp(); fl(); return; }
        var h = t.match(/^(#{1,3})\s+(.*)$/);
        if (h) { fp(); fl(); var lvl = Math.min(3, h[1].length) + 1; out.push("<h" + lvl + ">" + inline(h[2]) + "</h" + lvl + ">"); return; }
        if (/^[-*]\s+/.test(t)) { fp(); list.push(t.replace(/^[-*]\s+/, "")); return; }
        fl(); para.push(t);
      });
      fp(); fl();
      return out.join("\n");
    }
    function fmtDate(iso) { try { return new Date(iso).toLocaleDateString("en-ZA", { year: "numeric", month: "long", day: "numeric" }); } catch (e) { return ""; } }
    function setMeta(name, val, prop) {
      var sel = prop ? 'meta[property="' + name + '"]' : 'meta[name="' + name + '"]';
      var el = document.querySelector(sel);
      if (!el) { el = document.createElement("meta"); el.setAttribute(prop ? "property" : "name", name); document.head.appendChild(el); }
      el.setAttribute("content", val);
    }
    function fetchJson(qs) { return fetch(FN + qs, { headers: { "Accept": "application/json" } }).then(function (r) { return r.json(); }); }

    function anonId() {
      try { var k = localStorage.getItem("cb_anon"); if (!k) { k = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random().toString(36).slice(2)); localStorage.setItem("cb_anon", k); } return k; } catch (e) { return ""; }
    }
    function track(slug, event, beacon) {
      try {
        var payload = JSON.stringify({ slug: slug, event: event, anon_id: anonId(), referrer: document.referrer || "" });
        if (beacon && navigator.sendBeacon) { navigator.sendBeacon(TRACK, new Blob([payload], { type: "application/json" })); return; }
        fetch(TRACK, { method: "POST", headers: { "Content-Type": "application/json" }, body: payload, keepalive: true }).catch(function () {});
      } catch (e) {}
    }
    function signupHref(campaign) { return "/?utm_source=seo&utm_medium=landing&utm_campaign=" + encodeURIComponent(campaign || "jobs") + "#/auth?mode=signup"; }
    function searchHref(campaign) { return "/?utm_source=seo&utm_medium=landing&utm_campaign=" + encodeURIComponent(campaign || "jobs") + "#/job-search"; }
    function footerCtaHtml(campaign) {
      return '<div class="footer-cta"><h3>Find your next role faster</h3>' +
        '<p>Search live jobs, tailor your CV to each one, and prep for interviews — free to start.</p>' +
        '<a class="cta" data-cta data-campaign="' + esc(campaign || "jobs") + '" href="' + signupHref(campaign) + '">Create your free account</a></div>';
    }

    function renderList() {
      document.title = "Jobs by role & city — CareerBoost";
      fetchJson("?resource=landing-list").then(function (d) {
        var pages = (d && d.pages) || [];
        if (!pages.length) { root.innerHTML = '<h1 class="page">Jobs by role &amp; city</h1><p class="empty">No guides yet — check back soon.</p>' + footerCtaHtml("jobs"); return; }
        var cards = pages.map(function (p) {
          return '<a class="page-card" href="/jobs/' + esc(p.slug) + '"><h2>' + esc(p.title) + "</h2>" + (p.excerpt ? "<p>" + esc(p.excerpt) + "</p>" : "") + "</a>";
        }).join("");
        root.innerHTML = '<h1 class="page">Jobs by role &amp; city</h1><p class="lead">Role-by-role guides to the South African job market.</p>' + cards + footerCtaHtml("jobs");
      }).catch(function () { root.innerHTML = '<h1 class="page">Jobs</h1><p class="empty">Couldn\'t load right now.</p>'; });
    }

    function renderPage(slug) {
      fetchJson("?resource=landing&slug=" + encodeURIComponent(slug)).then(function (d) {
        var p = d && d.page;
        if (!p) { root.innerHTML = '<a class="back" href="/jobs">← All guides</a><p class="empty">Page not found.</p>'; document.title = "Not found — CareerBoost"; return; }
        var seo = p.seo || {};
        document.title = (seo.metaTitle || p.title || "Jobs") + " — CareerBoost";
        var desc = seo.metaDescription || p.excerpt || "";
        if (desc) { setMeta("description", desc); setMeta("og:description", desc, true); }
        setMeta("og:title", p.title || "CareerBoost", true);
        setMeta("og:type", "article", true);
        if (p.og_image_url) setMeta("og:image", p.og_image_url, true);
        var canon = document.querySelector('link[rel="canonical"]');
        if (canon) canon.setAttribute("href", "https://www.careerboost.co.za/jobs/" + slug);
        root.innerHTML = '<a class="back" href="/jobs">← All guides</a>' +
          '<article class="page"><h1>' + esc(p.title) + "</h1>" + md(p.body) +
          '<div class="cta-row">' +
            '<a class="cta" data-cta data-campaign="' + esc(slug) + '" href="' + searchHref(slug) + '">Search live jobs</a>' +
            '<a class="cta secondary" data-cta data-campaign="' + esc(slug) + '" href="' + signupHref(slug) + '">Tailor my CV free</a>' +
          "</div></article>" + footerCtaHtml(slug);
        track(slug, "view");
      }).catch(function () { root.innerHTML = '<a class="back" href="/jobs">← All guides</a><p class="empty">Couldn\'t load this page.</p>'; });
    }

    document.addEventListener("click", function (e) {
      var a = e.target && e.target.closest ? e.target.closest("[data-cta]") : null;
      if (a) track(a.getAttribute("data-campaign") || "jobs", "click", true);
    });

    var path = location.pathname.replace(/\/+$/, "");
    var m = path.match(/^\/jobs\/(.+)$/);
    if (m && m[1]) renderPage(decodeURIComponent(m[1]).toLowerCase());
    else renderList();
  })();
  </script>
</body>
</html>
