<?xml version="1.0" encoding="UTF-8"?>
<!-- CareerBoost default logo. A rocket-trajectory mark inside a rounded
     gradient square. To replace with your own logo: drop a file named
     "logo.svg" (recommended) or "logo.png" into this same folder.
     The renderBrand() helper in welcome.route.js auto-prefers your
     file when present. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="CareerBoost">
  <defs>
    <linearGradient id="lpLogoBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22e3ff"/>
      <stop offset="50%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="lpLogoStroke" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#062018" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#062018" stop-opacity="0.95"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" ry="14" fill="url(#lpLogoBg)"/>
  <!-- Upward trajectory + spark, suggesting "boost" -->
  <path d="M14 46 L26 34 L36 40 L50 18" fill="none" stroke="url(#lpLogoStroke)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="50" cy="18" r="4" fill="#062018"/>
  <circle cx="50" cy="18" r="2" fill="#f8fbff"/>
  <!-- Subtle gridline base -->
  <path d="M10 52 H54" fill="none" stroke="#062018" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.4"/>
</svg>
