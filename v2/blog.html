<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — CareerBoost</title>
  <meta name="description" content="Career advice, resume tips, and South African job-market insights from CareerBoost." />
  <link rel="canonical" href="https://www.careerboost.co.za/blog" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="CareerBoost Blog" />
  <meta property="og:description" content="Career advice, resume tips, and South African job-market insights." />
  <meta property="og:image" content="https://www.careerboost.co.za/og-image.png" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #05070f; --card: #0d1326; --border: rgba(255,255,255,0.09);
      --accent: #7cf0ff; --accent2: #a888ff; --text: #f0f4ff; --muted: rgba(240,244,255,0.6);
    }
    body { background: var(--bg); color: var(--text); font-family: Inter, system-ui, sans-serif; line-height: 1.65; }
    a { color: var(--accent); }
    .wrap { max-width: 760px; margin: 0 auto; padding: 28px 20px 80px; }
    header.site { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid var(--border); }
    .brand { font-weight: 800; font-size: 18px; letter-spacing: -0.01em; text-decoration: none; color: var(--text); }
    .brand span { color: var(--accent); }
    .cta { font-size: 13px; font-weight: 600; padding: 8px 14px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #04121a; text-decoration: none; }
    h1.page { font-size: 32px; font-weight: 800; letter-spacing: -0.02em; margin: 18px 0 6px; }
    .lead { color: var(--muted); margin-bottom: 28px; }
    .post-card { display: block; padding: 18px 20px; margin-bottom: 14px; border: 1px solid var(--border); border-radius: 14px; background: var(--card); text-decoration: none; color: inherit; transition: border-color .15s, transform .15s; }
    .post-card:hover { border-color: rgba(124,240,255,0.35); transform: translateY(-1px); }
    .post-card h2 { font-size: 19px; font-weight: 700; margin-bottom: 6px; }
    .post-card p { color: var(--muted); font-size: 14px; }
    .post-card time { display: block; color: var(--muted); font-size: 12px; margin-top: 8px; }
    article.post h1 { font-size: 30px; font-weight: 800; letter-spacing: -0.02em; margin: 10px 0 8px; }
    article.post .meta { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
    article.post h2 { font-size: 22px; font-weight: 700; margin: 28px 0 10px; }
    article.post h3 { font-size: 18px; font-weight: 700; margin: 22px 0 8px; }
    article.post p { margin: 0 0 16px; }
    article.post ul { margin: 0 0 16px 22px; }
    article.post li { margin-bottom: 6px; }
    .back { display: inline-block; margin-bottom: 18px; color: var(--muted); text-decoration: none; font-size: 14px; }
    .back:hover { color: var(--accent); }
    .footer-cta { margin-top: 40px; padding: 24px; border: 1px solid var(--border); border-radius: 16px; background: linear-gradient(135deg, rgba(124,240,255,0.07), rgba(168,136,255,0.05)); text-align: center; }
    .footer-cta h3 { font-size: 20px; margin-bottom: 8px; }
    .footer-cta p { color: var(--muted); margin-bottom: 16px; }
    .empty, .loading { color: var(--muted); padding: 40px 0; text-align: center; }
    footer.site { border-top: 1px solid var(--border); padding: 24px 20px; text-align: center; color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>
  <header class="site">
    <a class="brand" href="/">Career<span>Boost</span></a>
    <a class="cta" href="/#/auth?mode=signup">Get started free</a>
  </header>
  <main class="wrap" id="root"><p class="loading">Loading…</p></main>
  <footer class="site">© <span id="yr"></span> CareerBoost · <a href="/blog">Blog</a> · <a href="/">Home</a></footer>

  <script>
  (function () {
    var FN = "https://kddffkhwpbngiupfmcse.functions.supabase.co/content-public";
    var root = document.getElementById("root");
    document.getElementById("yr").textContent = new Date().getFullYear();

    function esc(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }
    function inline(s) {
      // Bold + links on already-escaped text.
      return esc(s)
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
        .replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" rel="noopener" target="_blank">$1</a>');
    }
    // Minimal, safe markdown -> HTML (headings, lists, paragraphs, bold, links).
    function md(src) {
      var lines = String(src || "").replace(/\r/g, "").split("\n");
      var out = [], para = [], list = [];
      function flushPara() { if (para.length) { out.push("<p>" + inline(para.join(" ")) + "</p>"); para = []; } }
      function flushList() { if (list.length) { out.push("<ul>" + list.map(function (i) { return "<li>" + inline(i) + "</li>"; }).join("") + "</ul>"); list = []; } }
      lines.forEach(function (ln) {
        var t = ln.trim();
        if (!t) { flushPara(); flushList(); return; }
        var h = t.match(/^(#{1,3})\s+(.*)$/);
        if (h) { flushPara(); flushList(); var lvl = Math.min(3, h[1].length) + 1; out.push("<h" + lvl + ">" + inline(h[2]) + "</h" + lvl + ">"); return; }
        if (/^[-*]\s+/.test(t)) { flushPara(); list.push(t.replace(/^[-*]\s+/, "")); return; }
        flushList(); para.push(t);
      });
      flushPara(); flushList();
      return out.join("\n");
    }
    function fmtDate(iso) {
      try { return new Date(iso).toLocaleDateString("en-ZA", { year: "numeric", month: "long", day: "numeric" }); }
      catch (e) { return ""; }
    }
    function setMeta(name, val, prop) {
      var sel = prop ? 'meta[property="' + name + '"]' : 'meta[name="' + name + '"]';
      var el = document.querySelector(sel);
      if (!el) { el = document.createElement("meta"); el.setAttribute(prop ? "property" : "name", name); document.head.appendChild(el); }
      el.setAttribute("content", val);
    }
    function fetchJson(qs) {
      return fetch(FN + qs, { headers: { "Accept": "application/json" } }).then(function (r) { return r.json(); });
    }
    var footerCta =
      '<div class="footer-cta"><h3>Ready to land your next role?</h3>' +
      '<p>CareerBoost helps you tailor your CV, find jobs, and prep for interviews — free to start.</p>' +
      '<a class="cta" href="/#/auth?mode=signup">Create your free account</a></div>';

    function renderList() {
      document.title = "Blog — CareerBoost";
      fetchJson("?resource=posts").then(function (d) {
        var posts = (d && d.posts) || [];
        if (!posts.length) { root.innerHTML = '<h1 class="page">Blog</h1><p class="empty">No posts yet — check back soon.</p>'; return; }
        var cards = posts.map(function (p) {
          return '<a class="post-card" href="/blog/' + esc(p.slug) + '">' +
            "<h2>" + esc(p.title) + "</h2>" +
            (p.excerpt ? "<p>" + esc(p.excerpt) + "</p>" : "") +
            (p.published_at ? "<time>" + esc(fmtDate(p.published_at)) + "</time>" : "") +
            "</a>";
        }).join("");
        root.innerHTML = '<h1 class="page">Career advice &amp; job-market insights</h1>' +
          '<p class="lead">Practical tips to land your next role in South Africa.</p>' + cards + footerCta;
      }).catch(function () { root.innerHTML = '<h1 class="page">Blog</h1><p class="empty">Couldn\'t load posts right now.</p>'; });
    }

    function renderPost(slug) {
      fetchJson("?resource=post&slug=" + encodeURIComponent(slug)).then(function (d) {
        var p = d && d.post;
        if (!p) { root.innerHTML = '<a class="back" href="/blog">← All posts</a><p class="empty">Post not found.</p>'; document.title = "Not found — CareerBoost"; return; }
        var seo = p.seo || {};
        var title = (seo.metaTitle || p.title || "CareerBoost") + " — CareerBoost";
        document.title = title;
        var desc = seo.metaDescription || p.excerpt || "";
        if (desc) { setMeta("description", desc); setMeta("og:description", desc, true); }
        setMeta("og:title", p.title || "CareerBoost", true);
        setMeta("og:type", "article", true);
        if (p.og_image_url) setMeta("og:image", p.og_image_url, true);
        var canon = document.querySelector('link[rel="canonical"]');
        if (canon) canon.setAttribute("href", "https://www.careerboost.co.za/blog/" + slug);
        root.innerHTML = '<a class="back" href="/blog">← All posts</a>' +
          '<article class="post"><h1>' + esc(p.title) + "</h1>" +
          (p.published_at ? '<div class="meta">' + esc(fmtDate(p.published_at)) + "</div>" : "") +
          md(p.body) + "</article>" + footerCta;
      }).catch(function () { root.innerHTML = '<a class="back" href="/blog">← All posts</a><p class="empty">Couldn\'t load this post.</p>'; });
    }

    var path = location.pathname.replace(/\/+$/, "");
    var m = path.match(/^\/blog\/(.+)$/);
    if (m && m[1]) renderPost(decodeURIComponent(m[1]).toLowerCase());
    else renderList();
  })();
  </script>
</body>
</html>
