# Apply Supabase migrations to production on merge to main.
#
# WHY THIS EXISTS: the repo had no automated migration apply — only Vercel is
# wired to GitHub, so frontend deploys happened automatically but database
# migrations did not. They relied on a manual `npx supabase db push` (see
# backend/README.md), which is easy to forget — that's how 0036–0040 ended up
# merged-but-unapplied. This workflow makes the apply automatic AND visible
# (a green/red check on every commit that touches migrations), so a stall is
# obvious instead of silent.
#
# ── To enable (one-time) ─────────────────────────────────────────────────────
#   Add two GitHub repo secrets (Settings → Secrets and variables → Actions):
#     SUPABASE_ACCESS_TOKEN  — from https://supabase.com/dashboard/account/tokens
#     SUPABASE_DB_PASSWORD   — the database password for project kddffkhwpbngiupfmcse
#   Until BOTH are set, this workflow no-ops (it won't touch the database).
#
#   First run clears the current backlog: set the secrets, then either push a
#   migration change or trigger this workflow manually (Actions → "DB migrate"
#   → Run workflow). Or just run `npx supabase db push` locally once now.
#
# SAFETY: runs only on main, only when files under backend/supabase/migrations/
# change (or manual dispatch). `supabase db push` applies just the migrations
# not yet in the remote history — it never drops or resets anything.

name: DB migrate

on:
  push:
    branches: [main]
    paths:
      - "backend/supabase/migrations/**"
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: kddffkhwpbngiupfmcse
    steps:
      - name: Gate on secrets
        id: gate
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] || [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo "SUPABASE_ACCESS_TOKEN / SUPABASE_DB_PASSWORD not set — skipping (see workflow header)."
            echo "go=false" >> "$GITHUB_OUTPUT"
          else
            echo "go=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.go == 'true'
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        if: steps.gate.outputs.go == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link + push migrations
        if: steps.gate.outputs.go == 'true'
        working-directory: backend
        run: |
          set -euo pipefail
          supabase link --project-ref "$PROJECT_REF"
          supabase db push
          echo "→ current remote migration list:"
          supabase migration list
